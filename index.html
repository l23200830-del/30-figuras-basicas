<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Ciudad Geométrica</title>
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🎨 Replicador de Arte Geométrico</span>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row align-items-center g-4">
            <div class="col-md-6 text-center">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">Imagen Programada (Canvas)</div>
                    <div class="card-body p-2 bg-light">
                        <canvas id="cityCanvas" width="1000" height="500" class="img-fluid border"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6 text-center">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">Imagen Original</div>
                    <div class="card-body p-2 bg-light">
                        <img src="assets/img/imagen.jpg" alt="Original" class="img-fluid border">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p class="mb-0">Desarrollado por: Ing. en Sistemas Computacionales</p>
            <small>Pachuca, Hidalgo - 2026</small>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
