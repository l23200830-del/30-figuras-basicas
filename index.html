<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Geométrico | Proyecto Canvas</title>
    <link rel="shortcut icon" href="assets/img/icono.png" type="image/png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="assets/img/icono.png" alt="Logo" width="30" height="30" class="me-2">
                Programación Gráfica
            </a>
        </div>
    </nav>

    <main class="container my-auto py-5">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white text-center">
                        Dibujo por Programación
                    </div>
                    <div class="card-body p-2 bg-white">
                        <canvas id="cityCanvas" width="1000" height="500" class="img-fluid border"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-secondary text-white text-center">
                        Imagen Original (original.png)
                    </div>
                    <div class="card-body p-2 bg-white">
                        <img src="assets/img/original.png" alt="Original" class="img-fluid border w-100">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4">
        <div class="container">
            <p class="mb-0">Desarrollado por: Ing. en Sistemas Computacionales</p>
            <small class="text-muted">Tulancingo de Bravo, Hidalgo - 2026</small>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
